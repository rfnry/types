[project]
name = "rfnry-chat-protocol"
version = "0.1.0"
description = "rfnry/chat — shared protocol types (python)"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [
    {name = "rfnry", email = "contact@rfnry.dev"},
]
keywords = ["rfnry", "chat", "protocol", "pydantic"]
dependencies = [
    "pydantic>=2.13.2",
]

[project.urls]
Repository = "https://github.com/rfnry/types"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rfnry_chat_protocol"]

[project.optional-dependencies]
dev = [
    "mypy>=1.20.1",
    "poethepoet>=0.44.0",
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "ruff>=0.15.11",
    "build>=1.4.3",
]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.poe.tasks]
format = "ruff format ."
check = "ruff check ."
"check:fix" = "ruff check --fix ."
typecheck = "mypy src/rfnry_chat_protocol"
test = "pytest"
"test:cov" = "pytest --cov=src --cov-report=term-missing"
dev = ["check", "typecheck", "test"]
build = "python -m build"
